org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dkotlin.daemon.jvm.options=-Xmx1G
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.workers.max=2
android.useAndroidX=true

# Avoid Kotlin daemon connection issues on some Windows environments.
kotlin.compiler.execution.strategy=in-process
kotlin.incremental=true
