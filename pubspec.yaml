name: allowance_budget_dashboard
description: Allowance Budget Tracker recreated in Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0
  google_sign_in: ^6.1.0
  image_picker: ^1.1.2
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  country_flags: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_logo_white_bg.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
